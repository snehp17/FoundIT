<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - FoundIT</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Found<span>IT</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="report.html">Report</a>
            <a href="#">Items</a>
            <a href="#" class="active-link">Contact Us</a>
            <a href="login.html" class="btn login-btn">Login</a>
        </div>
    </nav>

    <div class="selection-container fade-in" style="padding-top: 3rem; min-height: calc(100vh - 80px);">
        <h2 class="section-title" style="margin-bottom: 2rem;">Contact the FoundIT Team</h2>
        
        <div class="card" style="width: 100%; max-width: 600px; text-align: center; padding: 3rem;">
            <div class="card-icon" style="font-size: 3rem; margin-bottom: 1rem;">📞</div>
            <h3 style="font-size: 1.5rem; margin-bottom: 2rem; color: #111827;">We're Here to Help</h3>
            
            <div style="display: flex; flex-direction: column; gap: 1.5rem; text-align: left; background: #f8fafc; padding: 2rem; border-radius: 12px; border: 1px solid #e2e8f0;">
                
                <div>
                    <strong style="color: #4F46E5; display: block; margin-bottom: 0.5rem; font-size: 1.1rem;">Phone Number</strong>
                    <p style="color: #4B5563; font-size: 1.1rem;">+91 12345 67890</p>
                    <p style="color: #9CA3AF; font-size: 0.9rem; margin-top: 0.25rem;">(Available Mon-Fri, 9AM to 5PM)</p>
                </div>
                
                <hr style="border: 0; border-top: 1px solid #e2e8f0;">
                
                <div>
                    <strong style="color: #4F46E5; display: block; margin-bottom: 0.5rem; font-size: 1.1rem;">University Address</strong>
                    <p style="color: #4B5563; line-height: 1.6; font-size: 1.1rem;">
                        FoundIT Operations Center<br>
                        Student Welfare Office, Block A<br>
                        Parul University Campus<br>
                        Vadodara, Gujarat 391760
                    </p>
                </div>

            </div>
            
            <a href="index.html" class="btn primary-btn" style="margin-top: 2rem;">Back to Home</a>
        </div>
    </div>
